<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 小画家画廊</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF6F2;
  --surface:#FFFFFF;
  --text:#2C2C2C;
  --text-secondary:#8B8B8B;
  --border:#EBE5DE;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --radius:16px;
  --radius-sm:10px;
  --primary:#D4A373;
  --primary-light:#EAD5B8;
  --accent:#6B9080;
  --accent-light:#A4C3B2;
  --warm:#E09F6E;
  --coral:#E07A5F;
  --header-h:64px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input,textarea{font:inherit;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;background:var(--surface);color:var(--text);width:100%;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:80px}
select{-webkit-appearance:none;appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 fill=%22%238B8B8B%22 viewBox=%220 0 16 16%22%3E%3Cpath d=%22M8 11L3 6h10z%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.header{position:sticky;top:0;z-index:100;background:rgba(250,246,242,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-logo{font-size:20px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;cursor:pointer}
.header-logo span{background:linear-gradient(135deg,var(--coral),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--warm)}
.btn-outline{border:1.5px solid var(--border);color:var(--text);background:var(--surface)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{color:var(--text-secondary)}
.btn-ghost:hover{color:var(--text);background:rgba(0,0,0,.04)}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-danger{color:var(--coral);border:1.5px solid rgba(224,122,95,.3)}
.btn-danger:hover{background:rgba(224,122,95,.08);border-color:var(--coral)}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:16px 24px 0;font-size:13px;color:var(--text-secondary);flex-wrap:wrap}
.breadcrumb a{transition:color .2s;cursor:pointer;color:var(--text-secondary)}
.breadcrumb a:hover{color:var(--primary)}
.breadcrumb .sep{opacity:.4}
.breadcrumb .current{color:var(--text);font-weight:500}
.feature-bar{display:flex;gap:6px;padding:12px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);margin:0 0 24px}
.feature-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg);color:var(--text-secondary);cursor:default}
.feature-tag.active{background:var(--primary-light);color:var(--primary)}
.feature-tag .badge{background:var(--primary);color:#fff;border-radius:10px;padding:0 6px;font-size:10px;line-height:16px}
.container{max-width:1280px;margin:0 auto;padding:0 24px 40px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.section-header h2{font-size:22px;font-weight:600;letter-spacing:-.3px}
.section-header .sub{color:var(--text-secondary);font-size:14px;font-weight:400}
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:40px}
.artist-card{background:var(--surface);border-radius:var(--radius);padding:24px 16px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:all .3s;border:2px solid transparent}
.artist-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08);border-color:var(--primary-light)}
.artist-avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;color:#fff}
.artist-name{font-size:16px;font-weight:600;margin-bottom:4px}
.artist-count{font-size:13px;color:var(--text-secondary)}
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-bottom:40px}
.album-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all .3s;border:2px solid transparent}
.album-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08);border-color:var(--primary-light)}
.album-cover{aspect-ratio:4/3;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text-secondary);overflow:hidden}
.album-cover img{width:100%;height:100%;object-fit:cover}
.album-info{padding:14px 16px}
.album-info h3{font-size:15px;font-weight:600;margin-bottom:3px}
.album-info p{font-size:13px;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.artwork-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.artwork-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all .3s;border:2px solid transparent}
.artwork-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08);border-color:var(--primary-light)}
.artwork-img{aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.artwork-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.artwork-card:hover .artwork-img img{transform:scale(1.05)}
.artwork-info{padding:14px 16px}
.artwork-info h3{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artwork-info .meta{font-size:12px;color:var(--text-secondary)}
.artwork-info .desc{font-size:13px;color:var(--text-secondary);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:56px;margin-bottom:16px;opacity:.5}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:14px;max-width:360px;margin:0 auto 20px}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--surface);border-radius:var(--radius);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:slideUp .25s}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.upload-area:hover,.upload-area.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-area .icon{font-size:40px;margin-bottom:8px}
.upload-preview{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.upload-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--border)}
.lightbox-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:40px;animation:fadeIn .3s}
.lightbox{display:flex;gap:24px;align-items:flex-start;max-width:90vw}
.lightbox-img{max-width:70vw;max-height:80vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lightbox-info{background:var(--surface);border-radius:12px;padding:20px;min-width:220px;max-width:300px;flex-shrink:0}
.lightbox-info h2{font-size:16px;font-weight:600;margin-bottom:4px}
.lightbox-close{position:fixed;top:20px;right:24px;z-index:301;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:none}
.lightbox-close:hover{background:rgba(255,255,255,.25)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);z-index:301;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:none}
.lightbox-nav:hover{background:rgba(255,255,255,.22)}
.lightbox-prev{left:20px}.lightbox-next{right:20px}
.avatar-colors{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.avatar-color{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s}
.avatar-color:hover,.avatar-color.selected{border-color:var(--text);transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@media(max-width:768px){
  .lightbox{flex-direction:column;align-items:center}
  .lightbox-img{max-width:95vw;max-height:60vh}
  .lightbox-info{max-width:95vw;width:100%}
  .artist-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .artwork-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .header{padding:0 16px}
  .container{padding:0 16px 32px}
  .breadcrumb{padding:12px 16px 0}
  .feature-bar{padding:10px 16px;gap:4px}
}
</style>
</head>
<body>
<div id="app">
<header class="header">
  <div class="header-left">
    <div class="header-logo" id="logoHome">🎨 <span>小画家画廊</span></div>
  </div>
  <div class="header-actions" id="headerActions"></div>
</header>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="feature-bar" id="featureBar"></div>
<div class="container" id="mainContent"></div>
<div id="modalContainer"></div>
</div>
<script>
var COLORS = ['#D4A373','#E07A5F','#81B29A','#6B9080','#E09F6E','#A4C3B2','#F2CC8F','#C77DFF','#72EFDD','#FF99C8','#AACCFF','#FFD6A5'];
function ld(){
  try{
    var d=JSON.parse(localStorage.getItem('kg'))||{a:[],b:[],w:[]};
    var f2=false;
    d.w.forEach(function(w){if(w.i&&typeof w.i==='object'){w.i=w.i._url||'';f2=true;}});
    if(f2)localStorage.setItem('kg',JSON.stringify(d));
    return d;
  }catch(e){return{a:[],b:[],w:[]}}
}
function sd(d){localStorage.setItem('kg',JSON.stringify(d))}
var D=ld();function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
var S={v:'home',aid:null,bid:null,wid:null,li:-1,mo:null,ei:null};
var UI=[];

function GC(){try{return JSON.parse(localStorage.getItem('kg_cfg'))||{}}catch(e){return{}}}
function SC(cfg){localStorage.setItem('kg_cfg',JSON.stringify(cfg))}

function es(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sk(el){el.style.animation='shake .3s';setTimeout(function(){el.style.animation='';},300);}

function nav(v,id){
  S.v=v;
  if(v==='home'){S.aid=null;S.bid=null;S.wid=null;}
  else if(v==='artist'){S.aid=id;S.bid=null;S.wid=null;}
  else if(v==='album'){S.bid=id;var al=D.b.find(function(x){return x.id===id});S.aid=al?al.aid:null;S.wid=null;}
  else if(v==='artwork'){S.wid=id;S.li=-1;}
  R();
}

function esc(s){return es(s)}
function atr(s,d){
  var el=document.getElementById(s);
  if(!el)return;
  el.innerHTML=d;
}

function R(){
  // breadcrumb
  var el=document.getElementById('breadcrumb');
  if(!el)return;
  var c=[{l:'🏠 首页',a:'home'}];
  if(S.aid){var at=D.a.find(function(x){return x.id===S.aid});if(at)c.push({l:at.n,a:'artist',id:at.id});}
  if(S.bid){var al=D.b.find(function(x){return x.id===S.bid});if(al)c.push({l:al.n,a:'album',id:al.id});}
  el.innerHTML=c.map(function(x,i){
    var sep=i>0?' <span class="sep">▸</span> ':'';
    if(i===c.length-1)return sep+'<span class="current">'+esc(x.l)+'</span>';
    return sep+'<a onclick="nav(\''+x.a+'\',\''+(x.id||'')+'\')">'+esc(x.l)+'</a>';
  }).join('');

  // feature bar
  var fb=document.getElementById('featureBar');
  if(fb){
    var tags=[];
    if(S.v==='home'){
      tags.push('👤 小画家管理','🖼️ 画集管理','📸 作品上传','✨ 作品展示');
    }else if(S.v==='artist'){
      tags.push('👤 小画家信息','🖼️ 画集管理','📸 上传作品','✨ 浏览作品');
    }else if(S.v==='album'){
      tags.push('🖼️ 画集信息','📸 上传作品','✨ 作品展示');
    }else if(S.v==='artwork'){
      tags.push('✨ 作品详情','✏️ 编辑作品','🗑️ 删除作品');
    }
    fb.innerHTML=tags.map(function(t){return '<span class="feature-tag active"><span class="icon">'+t.slice(0,2)+'</span>'+t.slice(2)+'</span>';}).join('');
  }

  // header actions
  var ha=document.getElementById('headerActions');
  if(ha){
    var b=[];
    if(S.v==='home')b.push({l:'+ 新建小画家',c:'btn btn-primary',a:'addArtist'});
    else if(S.v==='artist'){b.push({l:'+ 新建画集',c:'btn btn-primary btn-sm',a:'addAlbum'});b.push({l:'📸 上传',c:'btn btn-outline btn-sm',a:'uploadArtwork'});b.push({l:'← 返回',c:'btn btn-ghost btn-sm',a:'home'});}
    else if(S.v==='album'){b.push({l:'📸 上传',c:'btn btn-primary btn-sm',a:'uploadArtwork'});b.push({l:'← 返回',c:'btn btn-ghost btn-sm',a:'artist',id:S.aid});}
    else if(S.v==='artwork')b.push({l:'← 返回',c:'btn btn-ghost btn-sm',a:'album',id:S.bid});
    ha.innerHTML=b.map(function(x){return '<button class="'+x.c+'" data-a="'+x.a+'" data-id="'+(x.id||'')+'">'+x.l+'</button>';}).join('');
    ha.querySelectorAll('button[data-a]').forEach(function(bn){
      bn.addEventListener('click',function(e){
        var a=e.currentTarget.dataset.a;
        var id=e.currentTarget.dataset.id;
        if(a==='addArtist')M('addArtist');
        else if(a==='addAlbum')M('addAlbum');
        else if(a==='uploadArtwork')M('uploadArtwork');
        else if(a==='settings')M('settings');else if(a==='home'||a==='artist'||a==='album')nav(a,id||undefined);
      });
    });
  }

  // main content
  var mc=document.getElementById('mainContent');
  if(!mc)return;
  if(S.v==='home')mc.innerHTML=home();
  else if(S.v==='artist')mc.innerHTML=artist();
  else if(S.v==='album')mc.innerHTML=album();
  else if(S.v==='artwork')mc.innerHTML=detail();
  AE();
  MO();
}

document.getElementById('logoHome').addEventListener('click',function(){nav('home');});

function home(){
  var as=D.a;
  if(as.length===0)return '<div class="empty-state"><div class="icon">👤</div><h3>还没有小画家</h3><p>点击上方"新建小画家"开始创建吧 🎨</p></div>';
  var h='<div class="section-header"><div><h2>所有小画家</h2><span class="sub">共 '+as.length+' 位小画家 · '+D.b.length+' 个画集 · '+D.w.length+' 幅作品</span></div></div><div class="artist-grid">';
  as.forEach(function(a){
    var ac=D.b.filter(function(b){return b.aid===a.id}).length;
    var wc=D.w.filter(function(w){return w.aid===a.id}).length;
    h+='<div class="artist-card" onclick="nav(\'artist\',\''+a.id+'\')"><div class="artist-avatar" style="background:'+a.c+'">'+esc(a.n[0])+'</div><div class="artist-name">'+esc(a.n)+'</div><div class="artist-count">'+ac+' 个画集 · '+wc+' 幅作品</div></div>';
  });
  h+='</div>';return h;
}

function artist(){
  var at=D.a.find(function(x){return x.id===S.aid});
  if(!at)return '<div class="empty-state"><h3>小画家不存在</h3><button class="btn btn-primary" onclick="nav(\'home\')">返回首页</button></div>';
  var al=D.b.filter(function(x){return x.aid===at.id});
  var bio=at.b||'这位小画家还没有简介';
  var h='<div class="section-header" style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:16px"><div class="artist-avatar" style="background:'+at.c+';width:56px;height:56px;font-size:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0">'+esc(at.n[0])+'</div><div><h2 style="font-size:22px;font-weight:600">'+esc(at.n)+'</h2><span class="sub">'+esc(bio)+'</span></div></div></div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap"><button class="btn btn-outline btn-sm" onclick="M(\'editArtist\',\''+at.id+'\')">✏️ 编辑资料</button><button class="btn btn-outline btn-sm" onclick="M(\'addAlbum\')">+ 新建画集</button><button class="btn btn-outline btn-sm" onclick="M(\'uploadArtwork\')">📸 上传作品</button></div>';
  if(al.length===0){
    h+='<div class="empty-state"><div class="icon">📚</div><h3>还没有画集</h3><p>为小画家创建第一个画集吧</p></div>';
  }else{
    h+='<div class="section-header"><h2>画集 <span class="sub">('+al.length+')</span></h2></div><div class="album-grid">';
    al.forEach(function(al2){
      var ws=D.w.filter(function(w){return w.bid===al2.id});
      var cv=ws.length>0?ws[0].i:null;
      var desc=al2.desc||'';
      h+='<div class="album-card" onclick="nav(\'album\',\''+al2.id+'\')"><div class="album-cover">'+(cv?'<img src="'+cv+'" alt="'+esc(al2.n)+'">':'🎨')+'</div><div class="album-info"><h3>'+esc(al2.n)+'</h3><p>'+esc(desc)+' · '+ws.length+' 幅作品</p></div></div>';
    });
    h+='</div>';
  }
  return h;
}

function album(){
  var al=D.b.find(function(x){return x.id===S.bid});
  if(!al)return '<div class="empty-state"><h3>画集不存在</h3><button class="btn btn-primary" onclick="nav(\'home\')">返回首页</button></div>';
  var at=D.a.find(function(x){return x.id===al.aid});
  var ws=D.w.filter(function(w){return w.bid===al.id});
  var h='<div class="section-header"><div><h2>'+esc(al.n)+' <span class="sub">'+ws.length+' 幅作品</span></h2><div style="font-size:13px;color:var(--text-secondary);margin-top:4px">'+(at?'<a onclick="nav(\'artist\',\''+at.id+'\')" style="color:var(--primary);cursor:pointer">'+esc(at.n)+'</a>':'')+(al.desc?' · '+esc(al.desc):'')+'</div></div><div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="M(\'editAlbum\',\''+al.id+'\')">✏️ 编辑</button><button class="btn btn-outline btn-sm" onclick="M(\'uploadArtwork\')">📸 上传</button></div></div>';
  if(ws.length===0){
    h+='<div class="empty-state"><div class="icon">🖼️</div><h3>这个画集还没有作品</h3><p>上传第一幅画作吧</p></div>';
  }else{
    h+='<div class="artwork-grid">';
    ws.forEach(function(w){

function LKK(e){

function HF(files){
  var cfg=GC();
  Array.from(files).forEach(function(file){
    if(!file.type.startsWith('image/') && !file.name.match(/\.heic$/i) && !file.name.match(/\.heif$/i))return;
    if(file.name.match(/\.heic$/i)){
      // Try canvas conversion works on Safari, heic2any CDN for Chrome/Firefox
      h2j(file,function(jpg){
        if(jpg)processFile(jpg,cfg);
      });
    }else{
      processFile(file,cfg);
    }
  });
}

function processFile(file,cfg){
  if(cfg && cfg.t){
    var ext=file.name.split('.').pop()||'jpg';
    var fn='images/'+new Date().toISOString().slice(0,10)+'/'+id()+'.'+ext;
    var msg='Add artwork: '+fn;
    var r2=new FileReader();
    r2.onload=function(e){
      var b64=e.target.result.split(',')[1];
      UI.push({_uploading:true,fn:fn,b64:b64,msg:msg});
      RUP();
      var x=new XMLHttpRequest();
      x.open('PUT','https://api.github.com/repos/'+cfg.o+'/'+cfg.r+'/contents/'+fn,true);
      x.setRequestHeader('Authorization','Bearer '+cfg.t);
      x.setRequestHeader('Content-Type','application/json');
      x.onload=function(){
        if(x.status>=200&&x.status<300){
          var d=JSON.parse(x.responseText);
          var idx=UI.findIndex(function(u){return u.fn===fn});
          if(idx>=0){
            UI[idx]={_url:d.content.download_url,_uploading:false,fn:fn};
            RUP();
          }
        }else{
          var idx=UI.findIndex(function(u){return u.fn===fn});
          if(idx>=0){UI.splice(idx,1);alert('上传失败: '+x.status);}
        }
      };
      x.onerror=function(){
        var idx=UI.findIndex(function(u){return u.fn===fn});
        if(idx>=0){UI.splice(idx,1);alert('网络错误，上传失败');}
      };
      x.send(JSON.stringify({message:msg,content:b64,branch:cfg.b||'main'}));
    };
    r2.readAsDataURL(file);
  }else{
    var r=new FileReader();
    r.onload=function(e){UI.push(e.target.result);RUP();};
    r.readAsDataURL(file);
  }
}

function h2j(file,cb){
  var url=URL.createObjectURL(file);
  var img=new Image();
  img.onload=function(){
    URL.revokeObjectURL(url);
    var c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    c.getContext('2d').drawImage(img,0,0);
    c.toBlob(function(b){
      cb(new File([b],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'}));
    },'image/jpeg',0.92);
  };
  img.onerror=function(){
    URL.revokeObjectURL(url);
    if(!window.heic2any){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
      document.head.appendChild(s);
      s.onload=function(){
        heic2any({blob:file,toType:'image/jpeg',quality:0.92}).then(function(r){
          var b=r instanceof Blob?r:r[0];
          cb(new File([b],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'}));
        });
      };
      s.onerror=function(){alert('HEIC转换失败');cb(null);};
    }else{
      heic2any({blob:file,toType:'image/jpeg',quality:0.92}).then(function(r){
        var b=r instanceof Blob?r:r[0];
        cb(new File([b],file.name.replace(/\.(heic|heif)$/i,'.jpg'),{type:'image/jpeg'}));
      });
    }
  };
  img.src=url;
}

function RUP(){
  var up=document.getElementById('fUP');
  if(!up)return;
  up.innerHTML=UI.map(function(img,i){
    if(img && img._uploading){
      return '<div style="position:relative;display:inline-block;width:80px;height:80px;border-radius:8px;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px">⏳</div>';
    }
    var src=img && img._url ? img._url : img;
    return '<div style="position:relative;display:inline-block"><img src="'+src+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--border)"><button onclick="var x=parseInt(this.dataset.idx);UI.splice(x,1);RUP();" data-idx="'+i+'" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--coral);color:#fff;font-size:12px;border:none;cursor:pointer">✕</button></div>';
  }).join('');
}

// Artist-album sync
document.addEventListener('change',function(e){
  if(e.target.id==='fWA'){
    var aid=e.target.value;
    var as=document.getElementById('fWB');
    if(!as)return;
    var f=D.b.filter(function(b){return b.aid===aid});
    as.innerHTML='<option value="">-- 请选择 --</option>'+f.map(function(b){return '<option value="'+b.id+'">'+esc(b.n)+'</option>';}).join('');
  }
});

R();
</script>
